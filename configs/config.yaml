project:
  random_state: 42

data:
  processed_path: "data/processed/mental_health_cleaned.csv"
  test_size: 0.2

tfidf:
  max_features: 50000
  ngram_range: [1, 2]

sklearn_models:
  logistic_regression:
    C: 1.0
  naive_bayes: {}
  random_forest:
    n_estimators: 200
  svm:
    C: 1.0

training:
  sklearn_output_dir: "models/sklearn"

logging:
  log_file: "logs/train.log"
